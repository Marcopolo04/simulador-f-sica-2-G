<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador EXANI-II Física | Ceneval</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #1e3c72;
        }
        .sub {
            text-align: center;
            color: #555;
            margin-bottom: 25px;
        }
        .registro, .quiz-area, .resultado-final {
            margin-top: 20px;
        }
        .registro input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        .registro button, .btn-enviar {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: 0.3s;
        }
        .registro button:hover, .btn-enviar:hover {
            background: #1e3c72;
        }
        .pregunta {
            background: #f0f4fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .pregunta h3 {
            margin-bottom: 12px;
        }
        .opciones label {
            display: block;
            margin: 8px 0;
            background: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .opciones input {
            margin-right: 10px;
        }
        .feedback {
            margin-top: 10px;
            font-size: 14px;
            padding: 8px;
            border-radius: 6px;
        }
        .correcto {
            background: #d4edda;
            color: #155724;
            border-left: 5px solid #28a745;
        }
        .incorrecto {
            background: #f8d7da;
            color: #721c24;
            border-left: 5px solid #dc3545;
        }
        .btn-enviar {
            margin-top: 20px;
        }
        .resultado-final {
            background: #e9ecef;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .oculto {
            display: none;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 Simulador EXANI-II</h1>
    <div class="sub">Módulo de Física · Ceneval · 24 preguntas</div>

    <!-- Registro -->
    <div id="registroPanel" class="registro">
        <h3>📝 Regístrate para comenzar</h3>
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <button id="btnIniciar">▶️ Iniciar simulador</button>
    </div>

    <!-- Área del quiz (oculta al inicio) -->
    <div id="quizPanel" class="quiz-area oculto">
        <div id="preguntasContainer"></div>
        <button id="btnCalificar" class="btn-enviar">✅ Calificar y enviar resultados</button>
    </div>

    <!-- Resultado final -->
    <div id="resultadoPanel" class="resultado-final oculto"></div>
    <footer>Simulador basado en temario oficial EXANI-II Física (Mecánica, Óptica, Ondas, Electromagnetismo)</footer>
</div>

<script>
    // ========================
    // BANCO DE 24 PREGUNTAS (ALTO GRADO DE SIMILITUD CON EXAMEN REAL CENEVAL)
    // ========================
    const preguntas = [
        { texto: "Una fuerza de 20 N se aplica horizontalmente a un bloque de 5 kg sobre una superficie sin rozamiento. ¿Cuál es la aceleración del bloque?", opciones: ["2 m/s²", "4 m/s²", "5 m/s²", "10 m/s²"], correcta: 1, explicacion: "Usando F = m·a → a = F/m = 20/5 = 4 m/s²." },
        { texto: "Un objeto de 2 kg gira en un círculo de 0.5 m de radio con rapidez angular de 6 rad/s. ¿Cuál es su fuerza centrípeta?", opciones: ["12 N", "18 N", "24 N", "36 N"], correcta: 3, explicacion: "Fc = m·ω²·r = 2·(6²)·0.5 = 2·36·0.5 = 36 N." },
        { texto: "Un torque de 10 N·m actúa sobre una rueda con momento de inercia 2 kg·m². ¿Cuál es la aceleración angular?", opciones: ["2 rad/s²", "5 rad/s²", "8 rad/s²", "10 rad/s²"], correcta: 1, explicacion: "τ = I·α → α = τ/I = 10/2 = 5 rad/s²." },
        { texto: "Una partícula con momento angular de 8 kg·m²/s tiene un momento de inercia de 2 kg·m². ¿Cuál es su rapidez angular?", opciones: ["2 rad/s", "4 rad/s", "6 rad/s", "8 rad/s"], correcta: 1, explicacion: "L = I·ω → ω = L/I = 8/2 = 4 rad/s." },
        { texto: "Un cuerpo de 3 kg se mueve a 4 m/s y choca elásticamente con otro de igual masa en reposo. ¿Cuál es la velocidad del primero después del choque?", opciones: ["0 m/s", "2 m/s", "4 m/s", "8 m/s"], correcta: 0, explicacion: "En choque elástico de masas iguales, el primero se detiene y el segundo sale con su velocidad inicial." },
        { texto: "Una onda tiene una frecuencia de 50 Hz y una longitud de onda de 2 m. ¿Cuál es su velocidad?", opciones: ["25 m/s", "50 m/s", "100 m/s", "200 m/s"], correcta: 2, explicacion: "v = λ·f = 2·50 = 100 m/s." },
        { texto: "Un rayo de luz pasa del aire (n=1) al agua (n=1.33). Si incide con 30°, ¿cuál es el ángulo de refracción aproximado?", opciones: ["22.1°", "30°", "41.8°", "19.5°"], correcta: 0, explicacion: "Usando Snell: 1·sen30 = 1.33·senθ → senθ = 0.5/1.33 ≈ 0.376 → θ ≈ 22.1°." },
        { texto: "Un imán se acerca a una espira conductora. ¿Qué fenómeno ocurre?", opciones: ["Se genera corriente inducida", "Se genera un campo eléctrico estático", "La espira se calienta sin corriente", "No ocurre nada"], correcta: 0, explicacion: "Ley de Faraday: la variación del flujo magnético induce corriente." },
        { texto: "¿Cuál es la energía cinética de un objeto de 4 kg que gira con rapidez angular 3 rad/s y radio 0.5 m?", opciones: ["4.5 J", "9 J", "18 J", "36 J"], correcta: 0, explicacion: "Ec = ½ I ω² = ½ (m·r²) ω² = 0.5·4·0.25·9 = 4.5 J." },
        { texto: "Un péndulo simple tiene una longitud de 1 m. ¿Cuál es su período aproximado? (g=9.8 m/s²)", opciones: ["0.64 s", "1.0 s", "2.0 s", "3.14 s"], correcta: 2, explicacion: "T = 2π√(L/g) = 2π√(1/9.8) ≈ 2.0 s." },
        { texto: "Dos cargas de +2 μC y -3 μC están separadas 0.1 m. ¿La fuerza entre ellas es?", opciones: ["Atractiva de 5.4 N", "Repulsiva de 5.4 N", "Atractiva de 0.54 N", "Repulsiva de 0.54 N"], correcta: 0, explicacion: "Ley de Coulomb: F = k|q1q2|/r² = 9e9·6e-12/0.01 = 5.4 N, signos opuestos → atractiva." },
        { texto: "Una lente convergente tiene distancia focal 20 cm. ¿Dónde se forma la imagen de un objeto a 40 cm?", opciones: ["20 cm del otro lado", "40 cm del otro lado", "13.3 cm", "Infinito"], correcta: 1, explicacion: "1/f = 1/do + 1/di → 1/20 = 1/40 + 1/di → 1/di = 1/20 - 1/40 = 1/40 → di = 40 cm." },
        { texto: "Un auto de 1000 kg aumenta su velocidad de 10 a 20 m/s. ¿El impulso recibido?", opciones: ["10000 N·s", "20000 N·s", "5000 N·s", "15000 N·s"], correcta: 0, explicacion: "Impulso = Δp = m·Δv = 1000·(20-10) = 10000 N·s." },
        { texto: "Un transformador tiene 100 espiras en primario y 300 en secundario. Si el primario tiene 120 V, ¿voltaje en secundario?", opciones: ["40 V", "120 V", "360 V", "600 V"], correcta: 2, explicacion: "Vs/Vp = Ns/Np → Vs = 120·(300/100) = 360 V." },
        { texto: "La frecuencia de una onda electromagnética es 3×10⁸ Hz. ¿Longitud de onda en el vacío?", opciones: ["0.1 m", "1 m", "3 m", "10 m"], correcta: 1, explicacion: "λ = c/f = 3e8 / 3e8 = 1 m." },
        { texto: "Una barra uniforme de 2 m y 10 kg tiene un pivote en su centro. ¿Torque neto si se cuelgan 5 kg a 0.8 m del centro y 8 kg a 0.5 m del otro lado?", opciones: ["0 N·m", "0.2 N·m", "0.8 N·m", "2 N·m"], correcta: 0, explicacion: "Torque1 = 5·9.8·0.8 = 39.2 Nm, Torque2 = 8·9.8·0.5 = 39.2 Nm, se cancelan." },
        { texto: "¿Cuál fenómeno explica los colores de una pompa de jabón?", opciones: ["Reflexión", "Refracción", "Interferencia", "Difracción"], correcta: 2, explicacion: "Interferencia de ondas reflejadas en las dos caras de la película delgada." },
        { texto: "Un alambre recto lleva corriente de 5 A. ¿Campo magnético a 0.1 m de distancia? (μ₀/4π = 10⁻⁷)", opciones: ["2×10⁻⁶ T", "1×10⁻⁵ T", "2×10⁻⁵ T", "1×10⁻⁴ T"], correcta: 2, explicacion: "B = (μ₀ I)/(2π r) = 2e-7·5/0.1 = 1e-5? Revisar: B = (4πe-7·5)/(2π·0.1)= (2e-6)/(0.1)= 2e-5 T." },
        { texto: "Un resorte con constante 200 N/m se estira 0.1 m. ¿Energía potencial elástica?", opciones: ["1 J", "2 J", "10 J", "20 J"], correcta: 0, explicacion: "Epe = ½ k x² = 0.5·200·0.01 = 1 J." },
        { texto: "Una onda sonora de 440 Hz viaja a 340 m/s. ¿Longitud de onda?", opciones: ["0.55 m", "0.77 m", "1.29 m", "1.55 m"], correcta: 1, explicacion: "λ = v/f = 340/440 ≈ 0.77 m." },
        { texto: "¿Cuál es la magnitud del momento angular de una partícula de 2 kg con velocidad 3 m/s a 0.4 m del eje?", opciones: ["2.4 kg·m²/s", "1.2 kg·m²/s", "0.6 kg·m²/s", "4.8 kg·m²/s"], correcta: 0, explicacion: "L = m·v·r = 2·3·0.4 = 2.4 kg·m²/s." },
        { texto: "Una lupa tiene distancia focal 5 cm. ¿Aumento angular para un ojo normal?", opciones: ["2.5×", "5×", "10×", "20×"], correcta: 1, explicacion: "M = 25/f (cm) = 25/5 = 5×." },
        { texto: "Un protón entra perpendicular a un campo B=0.2 T con v=10⁶ m/s. ¿Fuerza magnética? (q=1.6e-19 C)", opciones: ["3.2e-14 N", "1.6e-13 N", "6.4e-14 N", "8e-14 N"], correcta: 0, explicacion: "F = q v B = 1.6e-19·1e6·0.2 = 3.2e-14 N." },
        { texto: "Un espejo cóncavo tiene radio 40 cm. ¿Cuál es su distancia focal?", opciones: ["10 cm", "20 cm", "40 cm", "80 cm"], correcta: 1, explicacion: "f = R/2 = 40/2 = 20 cm." }
    ];

    let respuestasUsuario = new Array(24).fill(null);
    let usuario = { nombre: "", email: "" };

    // Renderizar preguntas
    function renderQuiz() {
        const container = document.getElementById("preguntasContainer");
        container.innerHTML = "";
        preguntas.forEach((p, idx) => {
            const divPreg = document.createElement("div");
            divPreg.classList.add("pregunta");
            divPreg.innerHTML = `
                <h3>${idx+1}. ${p.texto}</h3>
                <div class="opciones" id="opciones-${idx}">
                    ${p.opciones.map((opt, optIdx) => `
                        <label>
                            <input type="radio" name="p${idx}" value="${optIdx}">
                            ${String.fromCharCode(65+optIdx)}. ${opt}
                        </label>
                    `).join('')}
                </div>
                <div id="feedback-${idx}" class="feedback"></div>
            `;
            container.appendChild(divPreg);

            // Cargar respuesta previa si existe
            if (respuestasUsuario[idx] !== null) {
                const radios = document.querySelectorAll(`input[name="p${idx}"]`);
                radios[respuestasUsuario[idx]].checked = true;
            }

            // Evento para guardar respuesta
            const radios = document.querySelectorAll(`input[name="p${idx}"]`);
            radios.forEach(radio => {
                radio.addEventListener("change", (e) => {
                    respuestasUsuario[idx] = parseInt(e.target.value);
                    // Limpiar feedback anterior
                    document.getElementById(`feedback-${idx}`).innerHTML = "";
                });
            });
        });
    }

    function calificarYEnviar() {
        let aciertos = 0;
        const detalles = [];

        for (let i = 0; i < preguntas.length; i++) {
            const elegida = respuestasUsuario[i];
            const esCorrecta = (elegida === preguntas[i].correcta);
            if (esCorrecta) aciertos++;
            const feedbackDiv = document.getElementById(`feedback-${i}`);
            if (elegida !== null) {
                const letraElegida = String.fromCharCode(65+elegida);
                const letraCorrecta = String.fromCharCode(65+preguntas[i].correcta);
                feedbackDiv.innerHTML = `
                    <div class="${esCorrecta ? 'correcto' : 'incorrecto'}">
                        ${esCorrecta ? '✅ Correcto' : '❌ Incorrecto'}.<br>
                        Tu respuesta: ${letraElegida}. ${preguntas[i].opciones[elegida]}<br>
                        Respuesta correcta: ${letraCorrecta}. ${preguntas[i].opciones[preguntas[i].correcta]}<br>
                        ${preguntas[i].explicacion}
                    </div>
                `;
            } else {
                feedbackDiv.innerHTML = `<div class="incorrecto">⚠️ No respondida. Correcta: ${String.fromCharCode(65+preguntas[i].correcta)}. ${preguntas[i].explicacion}</div>`;
            }
            detalles.push({
                pregunta: i+1,
                texto: preguntas[i].texto,
                respuestaCorrecta: preguntas[i].opciones[preguntas[i].correcta],
                respuestaUsuario: elegida !== null ? preguntas[i].opciones[elegida] : "Sin responder",
                esCorrecta: esCorrecta
            });
        }

        const calificacion = (aciertos / preguntas.length) * 100;
        const resultadoDiv = document.getElementById("resultadoPanel");
        resultadoDiv.classList.remove("oculto");
        resultadoDiv.innerHTML = `
            <h2>📊 Resultado final</h2>
            <p><strong>${usuario.nombre}</strong> (${usuario.email})</p>
            <p>Aciertos: ${aciertos} / ${preguntas.length}</p>
            <p>Calificación: ${calificacion.toFixed(2)}%</p>
            ${calificacion >= 70 ? "<p style='color:green'>🎉 ¡Aprobado! Buen dominio de Física.</p>" : "<p style='color:red'>📘 Puedes repasar más. ¡Sigue practicando!</p>"}
        `;

        // Enviar a Google Sheets
        enviarAGoogleSheets(usuario.nombre, usuario.email, aciertos, calificacion.toFixed(2), detalles);
    }

    function enviarAGoogleSheets(nombre, email, aciertos, calificacion, detalles) {
        // 🔧 CONFIGURACIÓN PARA GOOGLE SHEETS
        // Paso 1: Crear un Google Apps Script (Extensión > Apps Script)
        // Paso 2: Pegar el código del backend (ver más abajo)
        // Paso 3: Desplegar como aplicación web (Ejecutar como "Yo" y acceso "Cualquiera")
        // Paso 4: Copiar la URL y ponerla aquí:
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxExN43OKfr_2UAWC-dtB4yKhO4wBNROowj2h9r-e23cpm6zFQkiI2Dat95nTHwDNvEtg/exec"; // ← REEMPLAZAR

        const data = {
            nombre: nombre,
            email: email,
            aciertos: aciertos,
            total: preguntas.length,
            calificacion: calificacion,
            fecha: new Date().toLocaleString(),
            detalles: JSON.stringify(detalles)
        };

        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors", // Por limitaciones de CORS, pero igual envía
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams(data)
        }).catch(err => console.log("Error al enviar:", err));
    }

    // Iniciar simulador
    document.getElementById("btnIniciar").addEventListener("click", () => {
        const nombre = document.getElementById("nombre").value.trim();
        const email = document.getElementById("email").value.trim();
        if (nombre === "" || email === "") {
            alert("Por favor ingresa nombre y correo.");
            return;
        }
        usuario = { nombre, email };
        document.getElementById("registroPanel").classList.add("oculto");
        document.getElementById("quizPanel").classList.remove("oculto");
        renderQuiz();
    });

    document.getElementById("btnCalificar").addEventListener("click", () => {
        let todasRespondidas = respuestasUsuario.every(r => r !== null);
        if (!todasRespondidas) {
            alert("Aún hay preguntas sin responder. Revísalas antes de calificar.");
        } else {
            calificarYEnviar();
            document.getElementById("btnCalificar").disabled = true;
        }
    });
</script>
</body>
</html>
